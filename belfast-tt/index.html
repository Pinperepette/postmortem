<html lang="it">
<head>
<meta charset="UTF-8">

<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>

<style>
  :root{
    --bg:#0d1117; --panel:#161b22; --panel2:#1c2530; --bord:#2a3340;
    --txt:#e6edf3; --muted:#8b98a5; --accent:#58a6ff;
    --pro:#f0883e; --anti:#58a6ff; --cron:#8b949e; --dop:#d29922;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;background:var(--bg);color:var(--txt);line-height:1.55;padding:0 0 80px}
  a{color:var(--accent);text-decoration:none} a:hover{text-decoration:underline}
  .wrap{max-width:1320px;margin:0 auto;padding:0 32px}
  header{background:linear-gradient(135deg,#2a160d,#0d1117);border-bottom:1px solid var(--bord);padding:30px 0 38px;margin-bottom:30px}
  .langsw{display:flex;gap:6px;justify-content:flex-end;margin-bottom:18px;flex-wrap:wrap}

  .headgrid{display:grid;grid-template-columns:1fr 360px;gap:28px;align-items:start}

  .badges{margin-top:18px;display:flex;gap:10px;flex-wrap:wrap}
  .badge{background:var(--panel2);border:1px solid var(--bord);border-radius:30px;padding:6px 14px;font-size:.82rem;color:var(--muted)}
  .badge b{color:var(--txt)}
  .insight{background:linear-gradient(135deg,rgba(210,153,34,.14),var(--panel));border:1px solid rgba(210,153,34,.45);border-radius:16px;padding:20px 22px}
  .insight .lbl{font-size:.74rem;letter-spacing:2px;text-transform:uppercase;color:var(--dop);font-weight:700;margin-bottom:10px}
  .insight .txt{font-size:.98rem;color:#e8dfc8;line-height:1.5}
  .insight .txt b{color:#fff}
  .hero{margin-top:34px;display:flex;align-items:baseline;gap:26px;flex-wrap:wrap;border-top:1px solid var(--bord);padding-top:26px}
  .hero .num{font-size:7rem;font-weight:800;letter-spacing:-5px;line-height:.9;color:var(--pro);text-shadow:0 0 60px rgba(240,136,62,.25)}
  .hero .cap{font-size:1.25rem;color:#d3dce4;max-width:430px;line-height:1.4}
  .hero .cap b{color:#fff}
  h2{font-size:1.45rem;margin:42px 0 6px;letter-spacing:-.3px}
  h2 .pre{color:var(--pro);font-size:.8rem;display:block;letter-spacing:2px;text-transform:uppercase;margin-bottom:4px}
  h2.minor{font-size:1.15rem;margin-top:34px}
  .lead{color:var(--muted);margin-bottom:20px;max-width:880px}
  .tldr{background:linear-gradient(135deg,#1c2530,#161b22);border:1px solid var(--bord);border-radius:16px;padding:24px 26px;margin-top:10px}
  .tldr h3{font-size:.8rem;letter-spacing:2px;text-transform:uppercase;color:var(--pro);margin-bottom:14px}
  .tldr ul{margin:0;padding-left:4px;list-style:none}
  .tldr li{margin:11px 0;color:#d3dce4;font-size:1.05rem;padding-left:30px;position:relative}
  .tldr li::before{content:"→";position:absolute;left:0;color:var(--pro);font-weight:700}
  .tldr li b{color:#fff}
  .kpis{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;margin-top:16px}
  .kpi{background:var(--panel);border:1px solid var(--bord);border-radius:14px;padding:20px}
  .kpi .n{font-size:2.0rem;font-weight:700;letter-spacing:-1px}
  .kpi .l{color:var(--muted);font-size:.85rem;margin-top:4px}
  .kpi.pro .n{color:var(--pro)} .kpi.anti .n{color:var(--anti)} .kpi.dop .n{color:var(--dop)}
  .lettura{background:rgba(88,166,255,.07);border:1px solid #244;border-left:4px solid var(--accent);border-radius:12px;padding:16px 20px;margin-top:16px}
  .lettura h3{font-size:.78rem;letter-spacing:1px;text-transform:uppercase;color:var(--accent);margin-bottom:6px}
  .lettura p{color:#d3dce4;margin:0}
  .quadro{display:grid;grid-template-columns:340px 1fr;gap:20px;align-items:center;margin-top:8px}
  .quadro .cbox{height:280px}
  .quadro .takeaway{background:var(--panel);border:1px solid var(--bord);border-left:4px solid var(--pro);border-radius:12px;padding:18px 22px;font-size:1.05rem;line-height:1.5}
  .quadro .takeaway b{color:#fff}
  .charts{display:grid;grid-template-columns:1fr 1fr;gap:18px;margin-top:8px}
  .chartcard{background:var(--panel);border:1px solid var(--bord);border-radius:14px;padding:18px}
  .chartcard.wide{grid-column:1 / -1}
  .chartcard h4{font-size:.98rem;margin-bottom:4px}
  .chartcard .cap{color:var(--muted);font-size:.8rem;margin-bottom:12px}
  .cbox{position:relative;height:300px} .cbox.tall{height:380px}
  .emocards{display:grid;grid-template-columns:1fr 1fr;gap:18px;margin:14px 0 22px}
  .emocard{border-radius:18px;padding:28px 30px;border:1px solid var(--bord);position:relative;overflow:hidden}
  .emocard.pro{background:linear-gradient(135deg,rgba(240,136,62,.16),var(--panel));border-color:rgba(240,136,62,.4)}
  .emocard.anti{background:linear-gradient(135deg,rgba(88,166,255,.14),var(--panel));border-color:rgba(88,166,255,.4)}
  .emocard .fr{font-size:.78rem;letter-spacing:2px;text-transform:uppercase;font-weight:700;margin-bottom:10px}
  .emocard.pro .fr{color:var(--pro)} .emocard.anti .fr{color:var(--anti)}
  .emocard .emo{display:flex;align-items:baseline;gap:14px;flex-wrap:wrap}
  .emocard .emoji{font-size:3.2rem;line-height:1}
  .emocard .nome{font-size:2.0rem;font-weight:800;letter-spacing:-.5px;color:#fff;line-height:1.05}
  .emocard .big{font-size:3.4rem;font-weight:800;letter-spacing:-2px;margin-left:auto}
  .emocard.pro .big{color:var(--pro)} .emocard.anti .big{color:var(--anti)}
  .emocard .des{color:var(--muted);margin-top:10px;font-size:.95rem;max-width:430px}
  .emocard .des b{color:var(--txt)}
  .cols{display:grid;grid-template-columns:1fr 1fr;gap:20px;margin-top:8px}
  .argbox{background:var(--panel);border:1px solid var(--bord);border-radius:14px;overflow:hidden}
  .argbox h3{padding:16px 18px;font-size:1.05rem}
  .argbox.pro h3{background:rgba(240,136,62,.12);border-bottom:1px solid #7a4a1f;color:var(--pro)}
  .argbox.anti h3{background:rgba(88,166,255,.12);border-bottom:1px solid #1f4a7a;color:var(--anti)}
  .argbox h3 small{display:block;color:var(--muted);font-weight:400;font-size:.78rem;margin-top:2px;text-transform:none;letter-spacing:0}
  .arg{padding:13px 18px;border-bottom:1px solid var(--bord)} .arg:last-child{border-bottom:none}
  .arg .t{font-weight:600;margin-bottom:2px;display:flex;align-items:baseline;gap:10px}
  .arg .t .pct{margin-left:auto;font-size:.85rem;font-weight:700;flex:none}
  .argbox.pro .arg .t .pct{color:var(--pro)} .argbox.anti .arg .t .pct{color:var(--anti)}
  .arg .d{color:var(--muted);font-size:.88rem}
  .arg .barbg{height:5px;background:var(--panel2);border-radius:4px;margin-top:9px;overflow:hidden}
  .arg .bar{height:100%;border-radius:4px}
  .argbox.pro .arg .bar{background:var(--pro)} .argbox.anti .arg .bar{background:var(--anti)}
  .violwrap{background:var(--panel);border:1px solid var(--bord);border-radius:14px;padding:20px;margin-top:8px}
  .violbar{display:flex;height:48px;border-radius:10px;overflow:hidden}
  .vseg{display:flex;align-items:center;justify-content:center;font-weight:700;color:#0d1117;font-size:.95rem;min-width:0}
  .viollegend{display:flex;gap:18px;flex-wrap:wrap;margin-top:14px;color:var(--muted);font-size:.85rem}
  .viollegend i{display:inline-block;width:11px;height:11px;border-radius:3px;margin-right:6px;vertical-align:middle}
  .viollegend b{color:var(--txt)}
  .tweets{display:grid;grid-template-columns:1fr 1fr 1fr;gap:16px;margin-top:8px}
  a.tw{display:block;background:var(--panel);border:1px solid var(--bord);border-left:4px solid var(--cron);border-radius:10px;padding:16px;color:inherit;transition:transform .12s,border-color .12s,background .12s}
  a.tw:hover{transform:translateY(-2px);background:#1a2230;text-decoration:none;border-color:var(--accent)}
  a.tw.pro{border-left-color:var(--pro)} a.tw.anti{border-left-color:var(--anti)} a.tw.cron{border-left-color:var(--cron)}
  .tw .hd{display:flex;align-items:center;gap:10px;margin-bottom:10px}
  .tw .hd .nm{flex:1;min-width:0}
  .tw .hd .nm b{display:block;font-size:.9rem;line-height:1.2;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .tw .hd .nm small{color:var(--muted);font-size:.78rem}
  .tw .tag{font-size:.64rem;padding:3px 8px;border-radius:20px;text-transform:uppercase;letter-spacing:.5px;white-space:nowrap;font-weight:700}
  .tag.pro{background:rgba(240,136,62,.15);color:var(--pro)} .tag.anti{background:rgba(88,166,255,.15);color:var(--anti)} .tag.cron{background:rgba(139,148,165,.15);color:var(--cron)}
  .tw .bd{font-size:.88rem;color:#d3dce4} .tw .ft{margin-top:12px;padding-top:10px;border-top:1px solid var(--bord);font-size:.76rem;color:var(--muted);display:flex;gap:14px;flex-wrap:wrap;align-items:center}
  .tw .ft b{color:var(--txt)} .tw .ft .open{margin-left:auto;color:var(--accent);font-weight:600}
  .av{width:38px;height:38px;border-radius:50%;object-fit:cover;background:var(--panel2);border:1px solid var(--bord);flex:none}
  .gallhead{display:grid;grid-template-columns:1fr 1fr 1fr;gap:16px;margin:14px 0 8px}
  .gallhead h4{font-size:.95rem;padding:8px 12px;border-radius:8px}
  .gallhead .hpro{background:rgba(240,136,62,.12);color:var(--pro)}
  .gallhead .hanti{background:rgba(88,166,255,.12);color:var(--anti)}
  .gallhead .hcron{background:rgba(139,148,165,.12);color:var(--cron)}
  .langduel{margin-top:22px}
  .langduel h4{font-size:1.02rem;margin-bottom:10px;display:flex;align-items:center;gap:8px}
  .langduel h4 small{color:var(--muted);font-weight:400;font-size:.8rem}
  .duel{display:grid;grid-template-columns:1fr 1fr;gap:14px}
  table{width:100%;border-collapse:collapse;margin-top:8px;font-size:.9rem}
  th,td{text-align:left;padding:10px 12px;border-bottom:1px solid var(--bord);vertical-align:middle}
  th{color:var(--muted);font-weight:600;font-size:.78rem;text-transform:uppercase;letter-spacing:.5px}
  .numwrap{display:grid;grid-template-columns:minmax(0,680px) 1fr;gap:18px;margin-top:10px;align-items:stretch}
  .numbers{background:var(--panel);border:1px solid var(--bord);border-radius:16px;padding:10px 26px 22px}
  .numbers table{font-size:.98rem}
  .numbers td:last-child{text-align:right;font-weight:700;color:#fff;font-variant-numeric:tabular-nums}
  .numbers tr.hl td:last-child{color:var(--pro)}
  .numbers tr.hl2 td:last-child{color:var(--anti)}
  .numbers .src{color:var(--muted);font-size:.76rem;margin-top:12px}
  .thermo{background:var(--panel);border:1px solid var(--bord);border-radius:16px;padding:18px 20px;display:flex;flex-direction:column}
  .thermo h4{font-size:.98rem;margin-bottom:4px}
  .thermo .cap{color:var(--muted);font-size:.8rem;margin-bottom:6px}
  .tscale{position:relative;flex:1;min-height:300px;margin:12px 6px 8px 34px}
  .tscale .track{position:absolute;left:0;top:0;bottom:0;width:12px;border-radius:8px;background:linear-gradient(to top,#f0883e55,#f85149);border:1px solid var(--bord)}
  .tscale .tick{position:absolute;left:-30px;font-size:.7rem;color:var(--muted);transform:translateY(-50%)}
  .tscale .tickline{position:absolute;left:0;width:12px;height:1px;background:#ffffff33}
  .tscale .tdot{position:absolute;left:2px;width:8px;height:8px;border-radius:50%;background:#fff;border:1px solid #0d1117;transform:translateY(-50%)}
  .tscale .tlab{position:absolute;left:26px;transform:translateY(-50%);display:flex;align-items:center;gap:7px;font-size:.85rem;white-space:nowrap}
  .tscale .tlab .ln{position:absolute;left:-14px;width:12px;height:1px;background:#8b98a566}
  .tscale .tlab b{font-variant-numeric:tabular-nums}
  .warn{background:rgba(248,81,73,.10);border:1px solid #f85149;border-left:5px solid #f85149;border-radius:12px;padding:11px 18px;margin-top:18px;color:#f6d3d0;font-size:.9rem}
  .warn b{color:#fff}
  .warn a{color:#ffb3ad;font-weight:600;white-space:nowrap}
  dialog{background:var(--panel);color:var(--txt);border:1px solid var(--bord);border-radius:16px;padding:28px 30px;max-width:680px;width:calc(100% - 40px)}
  dialog::backdrop{background:rgba(0,0,0,.65);backdrop-filter:blur(2px)}
  dialog h3{margin-bottom:14px;font-size:1.2rem}
  dialog p{color:#c8d2db;font-size:.92rem;margin-bottom:12px;line-height:1.6}
  dialog p b{color:#fff}
  dialog button{background:var(--panel2);color:var(--txt);border:1px solid var(--bord);border-radius:8px;padding:8px 18px;cursor:pointer;font-size:.9rem;margin-top:6px}
  dialog button:hover{border-color:var(--accent)}
  footer{margin-top:50px;padding-top:24px;border-top:1px solid var(--bord);color:var(--muted);font-size:.83rem}
  code{background:var(--panel2);padding:1px 6px;border-radius:5px;font-size:.85em}
  @media(max-width:1000px){.headgrid{grid-template-columns:1fr}.insight{max-width:520px}}
  @media(max-width:900px){.tweets,.gallhead{grid-template-columns:1fr 1fr}}
  @media(max-width:760px){
    .wrap{padding:0 16px}header{padding:22px 0 26px}header h1{font-size:1.55rem}header .sub{font-size:16px}
    .hero .num{font-size:4.2rem;letter-spacing:-3px}.hero{gap:16px;margin-top:24px;padding-top:20px}.hero .cap{font-size:1.05rem}
    h2{font-size:1.22rem;margin-top:34px}.tldr{padding:18px}.tldr li{font-size:.98rem}
    .kpis{grid-template-columns:repeat(2,1fr);gap:12px}.kpi{padding:15px}.kpi .n{font-size:1.7rem}
    .quadro{grid-template-columns:1fr}
    .charts,.tweets,.gallhead,.cols,.emocards,.duel,.numwrap{grid-template-columns:1fr}.chartcard.wide{grid-column:auto}.chartcard{padding:14px}
    .tscale{min-height:260px}
    .emocard{padding:20px}.emocard .big{font-size:2.6rem}.emocard .nome{font-size:1.5rem}
    .numbers{padding:6px 14px 16px}
    .cbox{height:260px}.cbox.tall{height:320px}.quadro .cbox{height:240px}
    th,td{padding:9px 8px;font-size:.86rem}
  }
</style>
</head>

<header>
  <div class="wrap">
    <div class="langsw" id="langsw"></div>

    <div class="hero">
      <div class="num" id="heroNum"></div>
      <div class="cap" data-i18n="hero_cap"></div>
    </div>
  </div>
</header>

<div class="wrap">

  <div class="warn" data-i18n="warn"></div>

  <dialog id="methDialog">
    <h3 data-i18n="m_title"></h3>
    <p data-i18n="m_p1"></p>
    <p data-i18n="m_p2"></p>
    <p data-i18n="m_p3"></p>
    <p data-i18n="m_p4"></p>
    <button id="closeMeth" data-i18n="m_close"></button>
  </dialog>

  <div class="tldr">
    <h3 data-i18n="tldr_h"></h3>
    <ul id="tldr"></ul>
  </div>

  <div class="kpis" id="kpis"></div>

  <!-- ============ QUADRO ============ -->
  <h2><span class="pre" data-i18n="s1_pre"></span><span data-i18n="s1_t"></span></h2>
  <p class="lead" data-i18n="s1_lead"></p>
  <div class="quadro">
    <div class="cbox"><canvas id="cStance"></canvas></div>
    <div class="takeaway" id="takeStance"></div>
  </div>
  <div class="charts">
    <div class="chartcard">
      <h4 data-i18n="c_eng_t"></h4>
      <div class="cap" data-i18n="c_eng_cap"></div>
      <div class="cbox"><canvas id="cEng"></canvas></div>
    </div>
    <div class="chartcard">
      <h4 data-i18n="c_auth_t"></h4>
      <div class="cap" data-i18n="c_auth_cap"></div>
      <div class="cbox"><canvas id="cAuth"></canvas></div>
    </div>
  </div>

  <!-- ============ TIMELINE ============ -->
  <h2><span class="pre" data-i18n="s2_pre"></span><span data-i18n="s2_t"></span></h2>
  <p class="lead" data-i18n="s2_lead"></p>
  <div class="chartcard wide">
    <div class="cbox tall"><canvas id="cTimeline"></canvas></div>
  </div>
  <div class="lettura"><h3 data-i18n="read_h"></h3><p data-i18n="read_tl"></p></div>

  <!-- ============ MOOD ============ -->
  <h2><span class="pre" data-i18n="s3_pre"></span><span data-i18n="s3_t"></span></h2>
  <p class="lead" data-i18n="s3_lead"></p>
  <div class="emocards" id="emocards"></div>
  <div class="charts">
    <div class="chartcard">
      <h4 data-i18n="c_moodall_t"></h4>
      <div class="cap" data-i18n="c_moodall_cap"></div>
      <div class="cbox"><canvas id="cMoodAll"></canvas></div>
    </div>
    <div class="chartcard">
      <h4 data-i18n="c_moodfr_t"></h4>
      <div class="cap" data-i18n="c_moodfr_cap"></div>
      <div class="cbox"><canvas id="cMoodFront"></canvas></div>
    </div>
  </div>
  <div class="lettura"><h3 data-i18n="read_h"></h3><p data-i18n="read_mood"></p></div>

  <!-- ============ ARGOMENTAZIONI ============ -->
  <h2><span class="pre" data-i18n="s4_pre"></span><span data-i18n="s4_t"></span></h2>
  <p class="lead" data-i18n="s4_lead"></p>
  <div class="cols">
    <div class="argbox pro">

      <div id="argPro"></div>
    </div>

      <div id="argAnti"></div>

    <div class="viollegend" id="viollegend"></div>
  </div>
  <div class="lettura"><h3 data-i18n="read_h"></h3><p data-i18n="viol_read"></p></div>

  <h2 class="minor" data-i18n="s4b_t"></h2>
  <p class="lead" data-i18n="s4b_lead"></p>
  <div class="chartcard wide">
    <div class="cbox tall"><canvas id="cThemes"></canvas></div>

  <div class="lettura"><h3 data-i18n="read_h"></h3><p data-i18n="read_themes"></p></div>

  <p class="lead" data-i18n="s5_lead"></p>
  <div class="charts">
    <div class="chartcard">
      <h4 data-i18n="c_langs_t"></h4>

      <div class="cbox"><canvas id="cLangs"></canvas></div>

      <h4 data-i18n="c_langpro_t"></h4>
      <div class="cap" data-i18n="c_langpro_cap"></div>
      <div class="cbox"><canvas id="cLangPro"></canvas></div>

  sub:'On the night of June 8 a Sudanese asylum seeker tried to slit a man\'s throat on a north Belfast street. The video went viral within hours, and over the next two nights anti-migrant riots erupted, with homes and vehicles set ablaze. How did X react? Who sides with the riots, who condemns them, with what emotions and arguments — across <b>6 languages</b>. Not a poll: a <b>thermometer of the moods sweeping Europe</b> on social media, measured on a single case.',

  m_p2:'<b>Collection.</b> Searches by event (the stabbing), reactions (riots, deportations) and language (EN, IT, ES, DE, FR, PT), sorted by both recency and engagement. Deduplicated by id, retweets excluded, viral quoted posts included. The hourly distribution is partly affected by collection time (morning of June 10).',

  read_tl:'The pro-riot camp starts <b>before the riots themselves</b>: in the hours between the video and the first clashes, “pro” posts already outnumber news, with explicit predictions (“I predict a riot”, “board up your windows”). The peak (227 posts/hour in the sample) comes with the images of the first night of riots, at 23 UTC on the 9th. The anti-riot camp activates <b>late</b>, growing only after the images of migrant families under attack, never approaching the opposite camp\'s volumes.',
  s3_pre:'Moods', s3_t:'Two different emotions, one per camp',
  s3_lead:'The dominant mood of each post. The key finding is not which emotion wins overall, but how the two camps live different emotions.',
  emo_pro_fr:'Pro-riot camp', emo_anti_fr:'Anti-riot camp',
  emo_pro_des:'Nearly one post in two is <b>pure fury</b>: “enough”, “fight back”, “about time”. The emotion of those who feel wronged and want a reckoning.',
  emo_anti_des:'Not mirror anger but <b>moral outrage</b>: “this is a pogrom”, “shame”. The emotion of those who judge, more than of those who fight.',
  c_moodall_t:'The overall climate', c_moodall_cap:'On-topic posts by dominant mood.',
  c_moodfr_t:'Pro-riot vs anti-riot', c_moodfr_cap:'% composition of moods within each camp.',
  read_mood:'The pro-riot camp runs on <b>anger</b> (nearly one post in two) with a streak of sarcasm; those who condemn the riots respond mostly with <b>moral indignation</b> (≈2/3 of the camp), not mirror anger. It\'s gut versus scorn. <b>Fear</b> and <b>solidarity</b> are nearly absent: the event is lived as ammunition for the argument, far less as a tragedy of the people involved.',
  s4_pre:'Arguments', s4_t:'What the two camps think',
  s4_lead:'The claims of those who support the riots and those who condemn them, weighted within each camp (% of the camp\'s posts).',
  arg_pro_h:'What the pro-riot camp thinks', arg_anti_h:'What the anti-riot camp thinks', arg_small:'posts · % within camp',
  s4b_t:'The weight of each argument in the whole conversation',
  s4b_lead:'Main argument of each post (excluding plain news). Orange: pro-riot arguments. Blue: anti-riot. Grey: cross-cutting.',
  read_themes:'The pro-riot camp is not monolithic: it rests on four pillars — the <b>failure of politicians and elites</b>, <b>migrant crime</b>, the attack on <b>“covering-up” media</b> (the strongest thread in Italy) and <b>remigration</b>. The anti camp focuses almost solely on denouncing what it calls a <b>“racist pogrom”</b>; concrete solidarity with the attacked families is marginal, as is solidarity with the stabbing victim.',
  s5_pre:'Geographies', s5_t:'One case, six conversations',
  s5_lead:'Stance composition by language (opinionated + news posts). The case went global: the pro-riot camp wins everywhere, with different intensity.',
  c_langs_t:'Stance by language', c_langs_cap:'% composition of on-topic posts by language.',
  c_langpro_t:'% pro-riot among opinionated', c_langpro_cap:'Excluding news: pro-camp share among those taking sides.',
  read_lang:'The <b>English-speaking</b> audience — closest to the facts — is also the <b>least skewed</b> (80% pro among opinionated): there, the anti camp has real voices (local journalists, residents, Irish accounts). The further from the event, the more the case becomes pure ideological symbol: the <b>Italian audience is the most extreme</b> (93% pro, 168 posts vs 10), followed by German and Portuguese. Abroad, the case is not news to follow but <b>a confirmation to brandish</b>.',
  duel_t:'The duel, country by country',
  duel_lead:'The most-seen pro-riot and anti-riot post in each language. The number gap between the two columns is the finding: in some countries the anti camp simply has no voice.',
  duel_small:'top pro vs top anti by engagement',

es:{
  name:'Español',
  title:'Belfast <span class="em">en llamas</span>, también en X<br>La agresión, la revuelta, los estados de ánimo',
  sub:'La noche del 8 de junio un solicitante de asilo sudanés intentó degollar a un hombre en una calle del norte de Belfast. El vídeo se hizo viral en horas y en las dos noches siguientes estallaron disturbios antiinmigrantes, con casas y vehículos en llamas. ¿Cómo reaccionó X? Quién apoya la revuelta, quién la condena, con qué emociones y argumentos — en <b>6 idiomas</b>. No es una encuesta: es un <b>termómetro de los ánimos que recorren Europa</b> en las redes, medido sobre un solo caso.',
  b_date:'8–10 de junio de 2026', b_source:'Fuente', b_corpus:'1.612 posts · 1.233 autores',
  hero_cap:'de los posts posicionados <b>apoya o justifica la revuelta</b>, o la usa para pedir deportaciones. Solo el 13,8% la condena.',
  ins_lbl:'📌 Observación', ins_txt:'La <b>doble condena</b> («horror por la agresión» + «rechazo de la revuelta») aparece solo en el <b>1,7%</b> de los posts posicionados: 17 de 1.009.<br><br>La posición moderada está <b>casi ausente</b>.',
  warn:'⚠️ <b>Nota metodológica</b> — Muestra: <b>1.612 posts</b> recuperados mediante búsqueda en X. <b>No representan a la población general.</b> <a href="#" class="openMeth">Metodología completa →</a>',
  m_title:'Metodología',
  m_p1:'<b>La muestra.</b> Los 1.612 posts son el <b>subconjunto recuperable por búsqueda</b> en X (10 consultas por evento, reacciones e idioma × 3 ventanas diarias, 8–10 de junio), <b>no</b> una foto completa ni probabilística del debate: el volumen real es mucho mayor. X además <b>no representa a la opinión pública</b>: su población y su algoritmo premian contenidos indignados y partidistas. Léanse como <b>tendencias internas a la conversación en X</b>, nada más.',
  m_p2:'<b>La captura.</b> Búsquedas por evento (el apuñalamiento), por reacciones (disturbios, deportaciones) y por idioma (EN, IT, ES, DE, FR, PT), ordenadas por recencia y por engagement. Deduplicación por id, retweets excluidos, citas virales incluidas. La distribución horaria refleja en parte la hora de captura (mañana del 10 de junio).',
  m_p3:'<b>La clasificación.</b> Cada post está etiquetado en tres dimensiones — <b>posición</b> (pro-revuelta, anti-revuelta, doble condena, crónica, offtopic), <b>estado de ánimo</b> (7 valores) y <b>argumento</b> (12 valores) — por clasificadores LLM con esquema cerrado. Cobertura 1.612/1.612. Los porcentajes «entre posicionados» excluyen crónica y offtopic. Un segundo eje, solo sobre los posts pro-revuelta, clasifica su relación con la violencia (exaltación, justificación, instrumental, no determinable).',
  m_p4:'<b>Los datos.</b> Dataset completo y replicable en <code>belfast-dataset.json</code>.',
  m_close:'Cerrar', tldr_h:'En síntesis',
  tldr:['En X el caso no tiene dos bandos equivalentes: entre los posts posicionados, el <b>84,5% apoya o justifica la revuelta</b> (o la usa para pedir deportaciones); el 13,8% la condena. Las <b>dobles condenas son 17</b> de 1.009 posts posicionados (1,7%).',
        'La visibilidad amplifica el desequilibrio: el bando pro-revuelta acumula el <b>56,7% de los likes</b>, el anti el 2,7%.',
        'Dos emociones distintas: los pro viven de <b>rabia</b>, los anti de <b>indignación moral</b>. Miedo y solidaridad casi ausentes.',
        'El argumento más fuerte tras la rabia: <b>«los medios y los políticos nos ocultan la verdad»</b> — dominante en Italia, contra los titulares con «atribuido» y «presunto».',
        'El caso es <b>global</b>: el bando pro-revuelta gana en los 6 idiomas; el público italiano es el más sesgado (93% entre posicionados).',
        'El bando pro no es un bloque: el <b>19,5% exalta la violencia</b>, el 33,9% la justifica, el <b>41,1% usa el caso</b> para tesis antiinmigración sin pronunciarse sobre los disturbios.'],
  viol_t:'¿Pero cuántos apoyan realmente la violencia?',
  viol_lead:'Segundo eje de clasificación, solo sobre los 853 posts pro-revuelta: ¿qué relación tienen con la violencia de los disturbios? La categoría no es monolítica — este es el dato que responde a la objeción más obvia.',
  viol_read:'Solo un post pro-revuelta de cada cinco (<b>19,5%</b>) exalta explícitamente la violencia — celebra los incendios o incita a continuar. Un tercio (<b>33,9%</b>) la justifica sin exaltarla («comprensible», «¿qué esperaban?»). El grupo más numeroso (<b>41,1%</b>) es instrumental: usa el caso para pedir deportaciones o atacar las políticas migratorias <i>sin pronunciarse</i> sobre los disturbios. Sumando exaltación y justificación, <b>455 posts (53,3% del bando)</b> respaldan o normalizan la violencia — el <b>45,1% de todos los posicionados</b>; el bando antiinmigración «puro» es el 34,8% de los posicionados.',
  v_end:'Exalta la violencia', v_gius:'La justifica', v_str:'Instrumental (solo antiinmigración)', v_nd:'No determinable',
  kpi:['posts recogidos (1.233 autores, 6 idiomas)','pro-revuelta entre los posicionados','cuota de likes del bando anti','posts que condenan ambas violencias'],
  s1_pre:'El cuadro', s1_t:'Quién está con quién',
  s1_lead:'Posición de los posts on-topic: apoya o justifica la revuelta (incluidas las peticiones de deportación), la condena, condena ambas violencias, o informa.',
  take:'De 1.558 posts on-topic, <b>853 apoyan o justifican la revuelta</b> y 139 la condenan: <b>6,1 a 1</b>. La voz más rara es la que une las dos condenas — horror por la agresión <i>y</i> rechazo de la revuelta: <b>17 posts</b>, el 1,7% de los posicionados. El término medio, en X, simplemente no existe.',
  c_eng_t:'Voces vs visibilidad', c_eng_cap:'Cuota de posts posicionados vs cuota de likes y visualizaciones. La visibilidad amplifica al bando pro y borra al anti.',
  c_auth_t:'Autores, no solo posts', c_auth_cap:'Clasificando a cada autor por su posición prevalente el cuadro no cambia: el desequilibrio no depende de pocas cuentas prolíficas.',
  s2_pre:'Dinámica', s2_t:'72 horas, hora a hora',
  s2_lead:'Posts por hora (UTC) por posición. La agresión fue hacia las 22:30 del día 8; el vídeo corre por la noche, la imputación y la primera noche de disturbios son del 9, la segunda ola del 10.',
  read_h:'Lectura',
  read_tl:'El bando pro-revuelta arranca <b>antes que la propia revuelta</b>: ya en las horas entre el vídeo y los primeros choques los posts «pro» superan a la crónica, con predicciones explícitas («I predict a riot»). El pico (227 posts/hora en la muestra) llega con las imágenes de la primera noche de disturbios, a las 23 UTC del 9. El bando anti se activa <b>tarde</b> y crece solo tras las imágenes de las familias migrantes atacadas, sin acercarse nunca a los volúmenes del bando contrario.',
  s3_pre:'Estados de ánimo', s3_t:'Dos emociones distintas, una por bando',
  s3_lead:'El estado de ánimo dominante de cada post. La clave no es qué emoción gana en total, sino cómo los dos bandos viven emociones distintas.',
  emo_pro_fr:'Bando pro-revuelta', emo_anti_fr:'Bando anti-revuelta',
  emo_pro_des:'Casi un post de cada dos es <b>furia pura</b>: «basta», «reaccionad», «ya era hora». La emoción de quien se siente agraviado y quiere un ajuste de cuentas.',
  emo_anti_des:'No rabia especular sino <b>indignación moral</b>: «esto es un pogromo», «vergüenza». La emoción de quien juzga, más que de quien combate.',
  c_moodall_t:'El clima general', c_moodall_cap:'Posts on-topic por estado de ánimo dominante.',
  c_moodfr_t:'Pro vs anti', c_moodfr_cap:'Composición % de los estados de ánimo dentro de cada bando.',
  read_mood:'El bando pro vive de <b>rabia</b> (casi un post de cada dos) con una vena de sarcasmo; quien condena los disturbios responde sobre todo con <b>indignación moral</b> (≈2/3 del bando). Es un choque entre tripa y desdén. Casi ausentes el <b>miedo</b> y la <b>solidaridad</b>: el evento se vive como munición del argumento, mucho menos como tragedia de las personas implicadas.',
  s4_pre:'Argumentos', s4_t:'Qué piensan los dos bandos',
  s4_lead:'Las tesis de quien apoya la revuelta y de quien la condena, con el peso de cada una dentro de su bando (% de los posts del bando).',
  arg_pro_h:'Qué piensan los pro-revuelta', arg_anti_h:'Qué piensan los anti-revuelta', arg_small:'posts · % del bando',
  s4b_t:'El peso de cada argumento en toda la conversación',
  s4b_lead:'Argumento principal de cada post (excluida la pura crónica). Naranja: argumentos pro. Azul: anti. Gris: transversales.',
  read_themes:'El bando pro no es monolítico: se apoya en cuatro pilares — el <b>fracaso de políticos y élites</b>, la <b>criminalidad de los migrantes</b>, el ataque a los <b>medios que «ocultan»</b> (el hilo más fuerte en Italia) y la <b>remigración</b>. El bando anti se concentra casi solo en denunciar lo que define como un <b>«pogromo racista»</b>; la solidaridad concreta con las familias atacadas es marginal, igual que con la víctima.',
  s5_pre:'Geografías', s5_t:'El mismo caso, seis conversaciones',
  s5_lead:'Composición de la posición por idioma (posicionados + crónica). El caso se hizo global: el bando pro gana en todas partes, con intensidades distintas.',
  c_langs_t:'Posición por idioma', c_langs_cap:'Composición % de los posts on-topic por idioma.',
  c_langpro_t:'% pro entre los posicionados', c_langpro_cap:'Excluida la crónica: cuota del bando pro entre quienes toman partido.',
  read_lang:'El público <b>inglés</b> — el más cercano a los hechos — es también el <b>menos sesgado</b> (80% pro entre posicionados): allí el bando anti tiene voces reales (periodistas locales, residentes, cuentas irlandesas). Cuanto más lejos del lugar del evento, más se vuelve el caso puro símbolo ideológico: el público <b>italiano es el más extremo</b> (93% pro, 168 posts contra 10). En el extranjero el caso no es una noticia que seguir sino <b>una confirmación que blandir</b>.',
  duel_t:'El duelo por país',
  duel_lead:'El post pro y el post anti más vistos en cada idioma. La diferencia de números entre las dos columnas es el dato: en algunos países el bando anti simplemente no tiene voz.',
  duel_small:'top pro vs top anti por engagement',
  s6_pre:'Las voces', s6_t:'Los posts más vistos, bando por bando',
  s6_lead:'Los posts con más engagement de cada bando (uno por autor). Clic para abrir en X.',
  gh_pro:'Pro-revuelta / antiinmigración', gh_anti:'Contra la revuelta', gh_cron:'Crónica',

de:{
  name:'Deutsch',
  title:'Belfast <span class="em">in Flammen</span>, auch auf X<br>Der Angriff, die Krawalle, die Stimmungen',
  sub:'In der Nacht des 8. Juni versuchte ein sudanesischer Asylbewerber, einem Mann auf offener Straße in Nord-Belfast die Kehle durchzuschneiden. Das Video ging binnen Stunden viral, in den zwei folgenden Nächten brachen migrantenfeindliche Krawalle aus, Häuser und Fahrzeuge brannten. Wie hat X reagiert? Wer steht zu den Krawallen, wer verurteilt sie, mit welchen Emotionen und Argumenten — in <b>6 Sprachen</b>. Keine Umfrage: ein <b>Thermometer der Stimmungen, die Europa durchziehen</b>, gemessen an einem einzigen Fall.',
  b_date:'8.–10. Juni 2026', b_source:'Quelle', b_corpus:'1.612 Posts · 1.233 Autoren',
  hero_cap:'der positionierten Posts <b>unterstützen oder rechtfertigen die Krawalle</b> oder fordern Abschiebungen. Nur 13,8% verurteilen sie.',
  ins_lbl:'📌 Beobachtung', ins_txt:'Die <b>doppelte Verurteilung</b> («Entsetzen über den Angriff» + «Ablehnung der Krawalle») erscheint nur in <b>1,7%</b> der positionierten Posts: 17 von 1.009.<br><br>Die gemäßigte Position ist <b>fast abwesend</b>.',
  warn:'⚠️ <b>Methodischer Hinweis</b> — Stichprobe: <b>1.612 Posts</b>, per X-Suche erhoben. <b>Sie repräsentieren nicht die Gesamtbevölkerung.</b> <a href="#" class="openMeth">Vollständige Methodik →</a>',
  m_title:'Methodik',
  m_p1:'<b>Die Stichprobe.</b> Die 1.612 Posts sind die <b>per Suche auffindbare Teilmenge</b> auf X (10 Suchanfragen nach Ereignis, Reaktionen und Sprache × 3 Tagesfenster, 8.–10. Juni), <b>kein</b> vollständiges oder probabilistisches Bild der Debatte: das reale Volumen ist weit größer. X <b>repräsentiert zudem nicht die öffentliche Meinung</b>: Population und Algorithmus belohnen empörte, parteiische Inhalte. Die Zahlen sind <b>Tendenzen innerhalb der X-Konversation</b>, nicht mehr.',
  m_p2:'<b>Die Erhebung.</b> Suchen nach Ereignis (Messerangriff), Reaktionen (Krawalle, Abschiebungen) und Sprache (EN, IT, ES, DE, FR, PT), sortiert nach Aktualität und Engagement. Dedupliziert nach id, Retweets ausgeschlossen, virale zitierte Posts eingeschlossen. Die Stundenverteilung ist teils vom Erhebungszeitpunkt geprägt (Vormittag des 10. Juni).',
  m_p3:'<b>Die Klassifikation.</b> Jeder Post ist auf drei Dimensionen etikettiert — <b>Haltung</b> (pro-Krawall, anti-Krawall, doppelte Verurteilung, Nachricht, offtopic), <b>Stimmung</b> (7 Werte) und <b>Argument</b> (12 Werte) — durch LLM-Klassifikatoren mit geschlossenem Schema. Abdeckung 1.612/1.612. Prozentsätze «unter Positionierten» schließen Nachrichten und Offtopic aus. Eine zweite Achse, nur auf Pro-Krawall-Posts, klassifiziert deren Verhältnis zur Gewalt (Billigung, Rechtfertigung, instrumentell, nicht bestimmbar).',
  m_p4:'<b>Die Daten.</b> Vollständiger replizierbarer Datensatz in <code>belfast-dataset.json</code>.',
  m_close:'Schließen', tldr_h:'Auf einen Blick',
  tldr:['Auf X gibt es keine zwei gleichwertigen Lager: Unter den positionierten Posts <b>unterstützen oder rechtfertigen 84,5% die Krawalle</b> (oder fordern Abschiebungen); 13,8% verurteilen sie. <b>Doppelte Verurteilungen: 17</b> von 1.009 positionierten Posts (1,7%).',
        'Sichtbarkeit verstärkt das Ungleichgewicht: Das Pro-Lager sammelt <b>56,7% der Likes</b>, das Anti-Lager 2,7%.',
        'Zwei verschiedene Emotionen: Pro-Posts leben von <b>Wut</b>, Anti-Posts von <b>moralischer Empörung</b>. Angst und Solidarität fast abwesend.',
        'Das stärkste Argument nach der Wut: <b>«Medien und Politiker verschweigen die Wahrheit»</b> — in Italien dominant, gegen Schlagzeilen mit «zugeschrieben» und «mutmaßlich».',
        'Der Fall ist <b>global</b>: In allen 6 Sprachen gewinnt das Pro-Lager; das italienische Publikum ist am stärksten verzerrt (93% unter Positionierten).',
        'Das Pro-Lager ist kein Block: <b>19,5% feiern die Gewalt</b>, 33,9% rechtfertigen sie, <b>41,1% nutzen den Fall</b> für migrationsfeindliche Thesen, ohne sich zu den Krawallen zu äußern.'],
  viol_t:'Aber wie viele billigen die Gewalt wirklich?',
  viol_lead:'Zweite Klassifikationsachse, nur auf den 853 Pro-Krawall-Posts: Wie stehen sie zur Gewalt der Krawalle? Die Kategorie ist nicht monolithisch — diese Zahl beantwortet den naheliegendsten Einwand.',
  viol_read:'Nur jeder fünfte Pro-Krawall-Post (<b>19,5%</b>) feiert die Gewalt explizit — bejubelt die Brände oder ruft zum Weitermachen auf. Ein Drittel (<b>33,9%</b>) rechtfertigt sie, ohne zu jubeln («verständlich», «was haben sie erwartet?»). Die größte Gruppe (<b>41,1%</b>) ist instrumentell: Sie nutzt den Fall für Abschiebeforderungen oder Angriffe auf die Migrationspolitik, <i>ohne sich zu den Krawallen zu äußern</i>. Zusammen billigen oder normalisieren <b>455 Posts (53,3% des Lagers)</b> die Gewalt — <b>45,1% aller Positionierten</b>; das «reine» Anti-Migrations-Lager liegt bei 34,8% der Positionierten.',
  v_end:'Feiert die Gewalt', v_gius:'Rechtfertigt sie', v_str:'Instrumentell (nur Anti-Migration)', v_nd:'Nicht bestimmbar',

  c_auth_t:'Autoren, nicht nur Posts', c_auth_cap:'Klassifiziert man jeden Autor nach seiner vorherrschenden Haltung, ändert sich das Bild nicht: Das Ungleichgewicht stammt nicht von wenigen produktiven Accounts.',

  read_h:'Lesart',
  read_tl:'Das Pro-Lager startet <b>vor den Krawallen selbst</b>: Schon in den Stunden zwischen Video und ersten Zusammenstößen übertreffen «Pro»-Posts die Nachrichten, mit expliziten Vorhersagen («I predict a riot»). Der Höhepunkt (227 Posts/Stunde in der Stichprobe) kommt mit den Bildern der ersten Krawallnacht, um 23 UTC am 9. Das Anti-Lager aktiviert sich <b>spät</b> und wächst erst nach den Bildern der angegriffenen Migrantenfamilien, ohne je an die Volumina des Gegenlagers heranzukommen.',

  read_themes:'Das Pro-Lager ist nicht monolithisch: Es ruht auf vier Säulen — dem <b>Versagen von Politik und Eliten</b>, der <b>Migrantenkriminalität</b>, dem Angriff auf <b>«vertuschende» Medien</b> (der stärkste Strang in Italien) und der <b>Remigration</b>. Das Anti-Lager konzentriert sich fast nur auf die Anprangerung dessen, was es als <b>«rassistisches Pogrom»</b> bezeichnet; konkrete Solidarität mit den angegriffenen Familien bleibt marginal, ebenso die mit dem Opfer.',

  s5_lead:'Haltungszusammensetzung nach Sprache (positioniert + Nachrichten). Der Fall wurde global: Das Pro-Lager gewinnt überall, mit unterschiedlicher Intensität.',

  read_lang:'Das <b>englischsprachige</b> Publikum — am nächsten an den Fakten — ist auch das <b>am wenigsten verzerrte</b> (80% pro unter Positionierten): Dort hat das Anti-Lager echte Stimmen (Lokaljournalisten, Anwohner, irische Accounts). Je weiter weg vom Ereignis, desto mehr wird der Fall zum reinen ideologischen Symbol: Das <b>italienische Publikum ist am extremsten</b> (93% pro, 168 Posts gegen 10). Im Ausland ist der Fall keine Nachricht zum Verfolgen, sondern <b>eine Bestätigung zum Schwingen</b>.',
  duel_t:'Das Duell, Land für Land',

fr:{
  name:'Français',
  title:'Belfast <span class="em">en flammes</span>, aussi sur X<br>L\'agression, l\'émeute, les états d\'âme',
  sub:'Dans la nuit du 8 juin, un demandeur d\'asile soudanais tente d\'égorger un homme en pleine rue au nord de Belfast. La vidéo devient virale en quelques heures et, les deux nuits suivantes, des émeutes anti-migrants éclatent, maisons et véhicules en flammes. Comment X a-t-il réagi ? Qui soutient l\'émeute, qui la condamne, avec quelles émotions et quels arguments — en <b>6 langues</b>. Pas un sondage : un <b>thermomètre des humeurs qui traversent l\'Europe</b> sur les réseaux, mesuré sur un seul cas.',
  b_date:'8–10 juin 2026', b_source:'Source', b_corpus:'1 612 posts · 1 233 auteurs',
  hero_cap:'des posts engagés <b>soutiennent ou justifient l\'émeute</b>, ou s\'en servent pour exiger des expulsions. Seuls 13,8% la condamnent.',
  ins_lbl:'📌 Observation', ins_txt:'La <b>double condamnation</b> (« horreur de l\'agression » + « rejet de l\'émeute ») n\'apparaît que dans <b>1,7%</b> des posts engagés : 17 sur 1 009.<br><br>La position modérée est <b>quasi absente</b>.',
  warn:'⚠️ <b>Note méthodologique</b> — Échantillon : <b>1 612 posts</b> récupérés via la recherche X. <b>Ils ne représentent pas la population générale.</b> <a href="#" class="openMeth">Méthodologie complète →</a>',
  m_title:'Méthodologie',
  m_p1:'<b>L\'échantillon.</b> Les 1 612 posts sont le <b>sous-ensemble récupérable par recherche</b> sur X (10 requêtes par événement, réactions et langue × 3 fenêtres quotidiennes, 8–10 juin), <b>pas</b> une photographie complète ni probabiliste du débat : le volume réel est bien supérieur. X ne <b>représente pas l\'opinion publique</b> : sa population et son algorithme récompensent les contenus indignés et partisans. Lire ces chiffres comme des <b>tendances internes à la conversation X</b>, rien de plus.',
  m_p2:'<b>La collecte.</b> Recherches par événement (l\'attaque au couteau), par réactions (émeutes, expulsions) et par langue (EN, IT, ES, DE, FR, PT), triées par récence et par engagement. Déduplication par id, retweets exclus, citations virales incluses. La distribution horaire reflète en partie l\'heure de collecte (matinée du 10 juin).',
  m_p3:'<b>La classification.</b> Chaque post est étiqueté sur trois dimensions — <b>position</b> (pro-émeute, anti-émeute, double condamnation, actualité, hors-sujet), <b>état d\'âme</b> (7 valeurs) et <b>argument</b> (12 valeurs) — par des classifieurs LLM à schéma fermé. Couverture 1 612/1 612. Les pourcentages « parmi les engagés » excluent actualité et hors-sujet. Un deuxième axe, sur les seuls posts pro-émeute, classe leur rapport à la violence (approbation, justification, instrumental, indéterminable).',
  m_p4:'<b>Les données.</b> Jeu de données complet et réplicable dans <code>belfast-dataset.json</code>.',
  m_close:'Fermer', tldr_h:'En résumé',
  tldr:['Sur X, le cas n\'a pas deux camps équivalents : parmi les posts engagés, <b>84,5% soutiennent ou justifient l\'émeute</b> (ou exigent des expulsions) ; 13,8% la condamnent. Les <b>doubles condamnations : 17</b> sur 1 009 posts engagés (1,7%).',
        'La visibilité amplifie le déséquilibre : le camp pro-émeute récolte <b>56,7% des likes</b>, le camp anti 2,7%.',
        'Deux émotions différentes : les pro vivent de <b>colère</b>, les anti d\'<b>indignation morale</b>. Peur et solidarité quasi absentes.',
        'L\'argument le plus fort après la colère : <b>« les médias et les politiques nous cachent la vérité »</b> — dominant en Italie, contre les titres avec « attribué » et « présumé ».',
        'Le cas est <b>mondial</b> : le camp pro-émeute gagne dans les 6 langues ; le public italien est le plus déséquilibré (93% parmi les engagés).',
        'Le camp pro n\'est pas un bloc : <b>19,5% exaltent la violence</b>, 33,9% la justifient, <b>41,1% utilisent le cas</b> pour des thèses anti-immigration sans se prononcer sur les émeutes.'],
  viol_t:'Mais combien approuvent vraiment la violence ?',
  viol_lead:'Deuxième axe de classification, sur les seuls 853 posts pro-émeute : quel rapport ont-ils avec la violence des émeutes ? La catégorie n\'est pas monolithique — c\'est le chiffre qui répond à l\'objection la plus évidente.',
  viol_read:'Seul un post pro-émeute sur cinq (<b>19,5%</b>) exalte explicitement la violence — se réjouit des incendies ou appelle à continuer. Un tiers (<b>33,9%</b>) la justifie sans l\'exalter (« compréhensible », « à quoi s\'attendaient-ils ? »). Le groupe le plus nombreux (<b>41,1%</b>) est instrumental : il utilise le cas pour exiger des expulsions ou attaquer les politiques migratoires <i>sans se prononcer</i> sur les émeutes. En additionnant approbation et justification, <b>455 posts (53,3% du camp)</b> soutiennent ou normalisent la violence — soit <b>45,1% de tous les engagés</b> ; le camp anti-immigration « pur » est à 34,8% des engagés.',
  v_end:'Exalte la violence', v_gius:'La justifie', v_str:'Instrumental (anti-immigration seulement)', v_nd:'Indéterminable',
  kpi:['posts collectés (1 233 auteurs, 6 langues)','pro-émeute parmi les posts engagés','part de likes du camp anti-émeute','posts condamnant les deux violences'],
  s1_pre:'Le tableau', s1_t:'Qui est avec qui',
  s1_lead:'Position des posts pertinents : soutient ou justifie l\'émeute (y compris les demandes d\'expulsion), la condamne, condamne les deux violences, ou rapporte les faits.',
  take:'Sur 1 558 posts pertinents, <b>853 soutiennent ou justifient l\'émeute</b> et 139 la condamnent : <b>6,1 contre 1</b>. La voix la plus rare est celle qui tient ensemble les deux condamnations — horreur de l\'agression <i>et</i> rejet de l\'émeute : <b>17 posts</b>, 1,7% des engagés. Le juste milieu, sur X, n\'existe tout simplement pas.',
  c_eng_t:'Voix vs visibilité', c_eng_cap:'Part des posts engagés vs part des likes et des vues. La visibilité amplifie le camp pro-émeute et efface le camp anti.',
  c_auth_t:'Des auteurs, pas que des posts', c_auth_cap:'En classant chaque auteur selon sa position dominante, le tableau ne change pas : le déséquilibre ne vient pas de quelques comptes prolifiques.',

pt:{
  name:'Português',
  title:'Belfast <span class="em">em chamas</span>, também no X<br>A agressão, a revolta, os estados de espírito',
  sub:'Na noite de 8 de junho, um requerente de asilo sudanês tentou degolar um homem numa rua do norte de Belfast. O vídeo tornou-se viral em poucas horas e nas duas noites seguintes explodiram distúrbios anti-migrantes, com casas e veículos em chamas. Como reagiu o X? Quem apoia a revolta, quem a condena, com que emoções e argumentos — em <b>6 línguas</b>. Não é uma sondagem: é um <b>termómetro dos humores que atravessam a Europa</b> nas redes, medido num único caso.',
  b_date:'8–10 de junho de 2026', b_source:'Fonte', b_corpus:'1.612 posts · 1.233 autores',
  hero_cap:'dos posts com posição <b>apoiam ou justificam a revolta</b>, ou usam-na para exigir deportações. Apenas 13,8% a condenam.',
  ins_lbl:'📌 Observação', ins_txt:'A <b>dupla condenação</b> («horror pela agressão» + «rejeição da revolta») aparece apenas em <b>1,7%</b> dos posts com posição: 17 em 1.009.<br><br>A posição moderada está <b>quase ausente</b>.',
  warn:'⚠️ <b>Nota metodológica</b> — Amostra: <b>1.612 posts</b> recuperados via pesquisa no X. <b>Não representam a população geral.</b> <a href="#" class="openMeth">Metodologia completa →</a>',
  m_title:'Metodologia',
  m_p1:'<b>A amostra.</b> Os 1.612 posts são o <b>subconjunto recuperável por pesquisa</b> no X (10 consultas por evento, reações e língua × 3 janelas diárias, 8–10 de junho), <b>não</b> um retrato completo nem probabilístico do debate: o volume real é muito maior. O X também <b>não representa a opinião pública</b>: a sua população e o seu algoritmo premeiam conteúdos indignados e partidários. Leiam-se como <b>tendências internas à conversa no X</b>, nada mais.',
  m_p2:'<b>A recolha.</b> Pesquisas por evento (o esfaqueamento), por reações (distúrbios, deportações) e por língua (EN, IT, ES, DE, FR, PT), ordenadas por recência e por engagement. Deduplicação por id, retweets excluídos, citações virais incluídas. A distribuição horária reflete em parte a hora da recolha (manhã de 10 de junho).',
  m_p3:'<b>A classificação.</b> Cada post está etiquetado em três dimensões — <b>posição</b> (pró-revolta, anti-revolta, dupla condenação, notícia, offtopic), <b>estado de espírito</b> (7 valores) e <b>argumento</b> (12 valores) — por classificadores LLM com esquema fechado. Cobertura 1.612/1.612. As percentagens «entre posicionados» excluem notícia e offtopic. Um segundo eixo, apenas sobre os posts pró-revolta, classifica a sua relação com a violência (exaltação, justificação, instrumental, não determinável).',
  m_p4:'<b>Os dados.</b> Dataset completo e replicável em <code>belfast-dataset.json</code>.',
  m_close:'Fechar', tldr_h:'Em síntese',
  tldr:['No X o caso não tem dois campos equivalentes: entre os posts com posição, <b>84,5% apoiam ou justificam a revolta</b> (ou usam-na para exigir deportações); 13,8% condenam-na. As <b>duplas condenações são 17</b> em 1.009 posts posicionados (1,7%).',
        'A visibilidade amplifica o desequilíbrio: o campo pró-revolta recolhe <b>56,7% dos likes</b>, o anti 2,7%.',
        'Duas emoções diferentes: os pró vivem de <b>raiva</b>, os anti de <b>indignação moral</b>. Medo e solidariedade quase ausentes.',
        'O argumento mais forte depois da raiva: <b>«os média e os políticos escondem-nos a verdade»</b> — dominante em Itália, contra os títulos com «atribuído» e «suspeito».',
        'O caso é <b>global</b>: o campo pró-revolta vence nas 6 línguas; o público italiano é o mais desequilibrado (93% entre posicionados).',
        'O campo pró não é um bloco: <b>19,5% exaltam a violência</b>, 33,9% justificam-na, <b>41,1% usam o caso</b> para teses anti-imigração sem se pronunciar sobre os distúrbios.'],
  viol_t:'Mas quantos apoiam realmente a violência?',
  viol_lead:'Segundo eixo de classificação, apenas sobre os 853 posts pró-revolta: que relação têm com a violência dos distúrbios? A categoria não é monolítica — este é o dado que responde à objeção mais óbvia.',
  viol_read:'Só um post pró-revolta em cada cinco (<b>19,5%</b>) exalta explicitamente a violência — celebra os incêndios ou incita a continuar. Um terço (<b>33,9%</b>) justifica-a sem a exaltar («compreensível», «o que esperavam?»). O grupo mais numeroso (<b>41,1%</b>) é instrumental: usa o caso para exigir deportações ou atacar as políticas migratórias <i>sem se pronunciar</i> sobre os distúrbios. Somando exaltação e justificação, <b>455 posts (53,3% do campo)</b> apoiam ou normalizam a violência — <b>45,1% de todos os posicionados</b>; o campo anti-imigração «puro» é 34,8% dos posicionados.',
  v_end:'Exalta a violência', v_gius:'Justifica-a', v_str:'Instrumental (só anti-imigração)', v_nd:'Não determinável',

    'pro_rivolta.remigration':'«Têm de voltar para casa»: deportações em massa, travão ao asilo, o «ban do terceiro mundo» de McGregor.',
    'pro_rivolta.contesto_ni':'«Escolheram a cidade errada»: o mito do irlandês que não dá a outra face.',
    'pro_rivolta.two_tier':'«Dois pesos, duas medidas»: polícia dura com os amotinados, branda com quem esfaqueia.',
    'pro_rivolta.solidarieta_vittima':'Pensamentos para a vítima, usados como argumento do campo.',
    'pro_rivolta.altro':'Apoio genérico à revolta: euforia com as chamas, «já era hora», apelos a sair à rua também noutros lugares.',
    'anti_rivolta.antirazzismo_pogrom':'«Isto é um pogrom»: famílias ao acaso, casas incendiadas com pessoas dentro. Não é protesto: é caça racista.',
    'anti_rivolta.altro':'Condenação da violência e de quem sopra o fogo: Tommy Robinson, Musk e as contas que chamaram a rua.',
    'anti_rivolta.contesto_ni':'«O velho vício de Belfast»: lealistas mascarados e sectarismo que muda de alvo — ontem católicos, hoje migrantes.',
    'anti_rivolta.solidarieta_migranti':'«Essas famílias não têm nada a ver»: a família ucraniana deslocada duas vezes, residentes estrangeiros em fuga.',
    'anti_rivolta.fallimento_politico':'«O Estado não protege»: a polícia chega tarde enquanto as casas ardem.',
    'anti_rivolta.media_bias':'Críticas espelhadas aos média, acusados de legitimar a rua.',
    'anti_rivolta.two_tier':'Duplos critérios invertidos: dureza só com os fracos.',
    'anti_rivolta.solidarieta_vittima':'Proximidade com a vítima, sem abraçar a revolta.'}
}
};

/* ===================== RENDER ===================== */
let charts = [];
let LANG = 'it';

function fmt(n, lang){ return n.toLocaleString(LOCALE[lang||LANG]); }
function pct(v, lang){ return v.toLocaleString(LOCALE[lang||LANG], {maximumFractionDigits:1}) + '%'; }

const avimg = t => `<img class="av" src="${t.avatar || `https://unavatar.io/twitter/${t.author}?fallback=false`}" loading="lazy" alt="" onerror="this.style.display='none'">`;
function twCard(t, cls, L){
  return `<a class="tw ${cls}" href="${t.url}" target="_blank" rel="noopener">
    <div class="hd">${avimg(t)}<div class="nm"><b>${t.name||t.author}</b><small>@${t.author} · ${FLAG[t.lang]||''} · ${t.date}</small></div>
    <span class="tag ${cls}">${L.tag[cls]}</span></div>
    <div class="bd">${t.text.replace(/</g,'&lt;')}${t.text.length>=240?'…':''}</div>
    <div class="ft"><span>❤️ <b>${fmt(t.likes)}</b></span><span>🔁 <b>${fmt(t.reposts)}</b></span><span>💬 <b>${fmt(t.replies)}</b></span><span class="open">${L.open_x}</span></div></a>`;
}

function renderAll(lang){
  LANG = lang;
  const L = TR[lang];
  document.documentElement.lang = lang;

  // language switcher
  document.getElementById('langsw').innerHTML = Object.keys(TR).map(k=>
    `<button class="${k===lang?'on':''}" data-lang="${k}">${FLAG[k]} ${TR[k].name}</button>`).join('');
  document.querySelectorAll('#langsw button').forEach(b=>b.addEventListener('click',()=>renderAll(b.dataset.lang)));

  // static i18n nodes
  document.querySelectorAll('[data-i18n]').forEach(el=>{ el.innerHTML = L[el.dataset.i18n] ?? ''; });

  // hero
  document.getElementById('heroNum').textContent = pct(D.meta.pro_pct);

  // tldr + kpis
  document.getElementById('tldr').innerHTML = L.tldr.map(t=>`<li>${t}</li>`).join('');
  document.getElementById('kpis').innerHTML = `
    <div class="kpi"><div class="n">${fmt(D.meta.posts)}</div><div class="l">${L.kpi[0]}</div></div>
    <div class="kpi pro"><div class="n">${pct(D.meta.pro_pct)}</div><div class="l">${L.kpi[1]}</div></div>
    <div class="kpi anti"><div class="n">${pct(D.meta.likes_anti_pct)}</div><div class="l">${L.kpi[2]}</div></div>
    <div class="kpi dop"><div class="n">${D.meta.doppia}</div><div class="l">${L.kpi[3]}</div></div>`;

  document.getElementById('takeStance').innerHTML = L.take;

  // emocards
  const MOODEMOJI = {rabbia:'😡', indignazione:'⚖️', ironia:'🃏', shock:'😱', paura:'😨', solidarieta:'🤝', neutro:'😐'};
  function topMood(front){
    const arr = D.mood_front[front], tot = arr.reduce((a,b)=>a+b,0);
    let bi = 0; arr.forEach((v,i)=>{ if(v>arr[bi]) bi=i; });
    return {key:D.moods[bi], pct:Math.round(100*arr[bi]/tot)};
  }
  const epm = topMood('pro_rivolta'), eam = topMood('anti_rivolta');
  document.getElementById('emocards').innerHTML = `
    <div class="emocard pro">
      <div class="fr">${L.emo_pro_fr}</div>
      <div class="emo"><span class="emoji">${MOODEMOJI[epm.key]}</span><span class="nome">${L.moodname[epm.key]}</span><span class="big">${epm.pct}%</span></div>
      <div class="des">${L.emo_pro_des}</div>
    </div>
    <div class="emocard anti">
      <div class="fr">${L.emo_anti_fr}</div>
      <div class="emo"><span class="emoji">${MOODEMOJI[eam.key]}</span><span class="nome">${L.moodname[eam.key]}</span><span class="big">${eam.pct}%</span></div>
      <div class="des">${L.emo_anti_des}</div>
    </div>`;

  // argomentazioni per fronte
  function renderArgs(front, elId, max){
    const rows = D.themes_front[front].filter(t=>t.key!=='cronaca_evento').slice(0,max);
    const top = rows[0] ? rows[0].pct : 100;
    document.getElementById(elId).innerHTML = rows.map(t=>`
      <div class="arg">
        <div class="t">${L.themes[t.key]||t.label}<span class="pct">${Math.round(t.pct)}%</span></div>
        <div class="d">${L.argdesc[front+'.'+t.key]||''}</div>
        <div class="barbg"><div class="bar" style="width:${Math.max(4,100*t.pct/top)}%"></div></div>
      </div>`).join('');
  }
  // rapporto con la violenza dentro il fronte pro
  const VCOL = {endorsement:'#f85149', giustificazione:'#f0883e', strumentale:'#d29922', non_determinabile:'#8b949e'};
  const VLBL = {endorsement:L.v_end, giustificazione:L.v_gius, strumentale:L.v_str, non_determinabile:L.v_nd};
  const vk = ['endorsement','giustificazione','strumentale','non_determinabile'];
  document.getElementById('violbar').innerHTML = vk.map(k=>{
    const v = D.violence[k];
    return `<div class="vseg" style="width:${v.pct}%;background:${VCOL[k]}" title="${VLBL[k]}: ${v.n}">${v.pct>=10?Math.round(v.pct)+'%':''}</div>`;
  }).join('');
  document.getElementById('viollegend').innerHTML = vk.map(k=>{
    const v = D.violence[k];
    return `<span><i style="background:${VCOL[k]}"></i>${VLBL[k]} · <b>${v.n}</b> (${v.pct.toLocaleString(LOCALE[LANG],{maximumFractionDigits:1})}%)</span>`;
  }).join('');

  renderArgs('pro_rivolta','argPro',6);
  renderArgs('anti_rivolta','argAnti',6);
  document.getElementById('proCount').textContent = `${fmt(D.stance.pro_rivolta)} ${L.arg_small}`;
  document.getElementById('antiCount').textContent = `${fmt(D.stance.anti_rivolta)} ${L.arg_small}`;

  // gallery
  let gal = '';
  for (let i = 0; i < 6; i++){
    if (D.tops.pro[i]) gal += twCard(D.tops.pro[i], 'pro', L);
    if (D.tops.anti[i]) gal += twCard(D.tops.anti[i], 'anti', L);
    if (D.tops.cronaca[i]) gal += twCard(D.tops.cronaca[i], 'cron', L);
  }
  document.getElementById('gallery').innerHTML = gal;

  // duels
  document.getElementById('duels').innerHTML = D.tops_lang.map(t=>`
    <div class="langduel">
      <h4>${FLAG[t.lang]} ${TR[t.lang] ? TR[t.lang].name : t.lang.toUpperCase()}<small>${L.duel_small}</small></h4>
      <div class="duel">
        ${t.pro ? twCard(t.pro,'pro',L) : '<div class="tw">—</div>'}
        ${t.anti ? twCard(t.anti,'anti',L) : '<div class="tw">—</div>'}
      </div>
    </div>`).join('');

  // numbers table
  document.getElementById('numbersTable').innerHTML =
    `<tr><th>${L.n_metric}</th><th style="text-align:right">${L.n_value}</th></tr>` +
    L.n_rows.map(r=>`<tr${r[2]?` class="${r[2]}"`:''}><td>${r[0]}</td><td>${r[1]}</td></tr>`).join('');
  document.getElementById('srcLine').innerHTML = L.src;

  // termometro per lingua
  const tmin = 78, tmax = 95;
  const titems = D.langs.map(l=>({key:l.key, pct:l.pro_pct})).sort((a,b)=>b.pct-a.pct);
  let th = '<div class="track"></div>';
  [80,85,90,95].forEach(v=>{
    const top = (tmax-v)/(tmax-tmin)*100;
    th += `<span class="tick" style="top:${top}%">${v}%</span><span class="tickline" style="top:${top}%"></span>`;
  });
  let lastTop = -99;
  titems.forEach(it=>{
    const real = (tmax-it.pct)/(tmax-tmin)*100;
    let top = real;
    if (top - lastTop < 8.5) top = lastTop + 8.5;
    lastTop = top;
    th += `<span class="tdot" style="top:${real}%"></span>
           <span class="tlab" style="top:${top}%"><span class="ln"></span>${FLAG[it.key]} ${it.key.toUpperCase()} <b>${Math.round(it.pct)}%</b></span>`;
  });
  document.getElementById('tscale').innerHTML = th;

  // method popup links (re-bind after innerHTML updates)
  document.querySelectorAll('.openMeth').forEach(el=>
    el.addEventListener('click', e=>{e.preventDefault(); document.getElementById('methDialog').showModal();}));

  buildCharts(L);
}

/* ===================== CHARTS ===================== */
function buildCharts(L){
  charts.forEach(c=>c.destroy());
  charts = [];

  charts.push(new Chart(cStance, {type:'doughnut', data:{
    labels:[L.st.pro, L.st.cron, L.st.anti, L.st.dop],
    datasets:[{data:[D.stance.pro_rivolta, D.stance.cronaca, D.stance.anti_rivolta, D.stance.doppia_condanna],
      backgroundColor:[C.pro, C.cron, C.anti, C.dop], borderColor:'#0d1117', borderWidth:3}]},
    options:{plugins:{legend:{position:'bottom'}}, cutout:'58%'}}));

  charts.push(new Chart(cEng, {type:'bar', data:{
    labels:L.q,
    datasets:[
      {label:L.st.pro, data:[100*D.stance.pro_rivolta/D.meta.ontopic, D.meta.likes_pro_pct, D.meta.views_pro_pct], backgroundColor:C.pro},
      {label:L.st.cron, data:[100*D.stance.cronaca/D.meta.ontopic, 100-D.meta.likes_pro_pct-D.meta.likes_anti_pct-1, 100-D.meta.views_pro_pct-D.meta.views_anti_pct-0.4], backgroundColor:C.cron},
      {label:L.st.anti, data:[100*D.stance.anti_rivolta/D.meta.ontopic, D.meta.likes_anti_pct, D.meta.views_anti_pct], backgroundColor:C.anti}]},
    options:{scales:{x:{stacked:true}, y:{stacked:true, max:100, ticks:{callback:v=>v+'%'}}},
      plugins:{legend:{position:'bottom'}, tooltip:{callbacks:{label:c=>`${c.dataset.label}: ${c.parsed.y.toFixed(1)}%`}}}}}));

  charts.push(new Chart(cAuth, {type:'bar', data:{
    labels:[L.st.pro, L.st.solocron, L.st.anti, L.st.dop],
    datasets:[{data:[D.auth.pro_rivolta, D.auth.solo_cronaca, D.auth.anti_rivolta, D.auth.doppia_condanna],
      backgroundColor:[C.pro, C.cron, C.anti, C.dop]}]},
    options:{indexAxis:'y', plugins:{legend:{display:false}},
      scales:{x:{title:{display:true,text:L.ax_auth}}}}}));

  const hlabels = D.hours.map(h=>{
    const hh = h.slice(11);
    return hh==='00' ? h.slice(8,10)+'/06' : (['06','12','18'].includes(hh) ? hh+':00' : '');
  });
  charts.push(new Chart(cTimeline, {type:'line', data:{
    labels:D.hours.map(h=>h.slice(8,10)+'/06 '+h.slice(11)+':00'),
    datasets:[
      {label:L.st.pro, data:D.timeline.pro_rivolta, borderColor:C.pro, backgroundColor:'rgba(240,136,62,.25)', fill:true, tension:.35, pointRadius:0, borderWidth:2},
      {label:L.st.cron, data:D.timeline.cronaca, borderColor:C.cron, backgroundColor:'rgba(139,148,165,.15)', fill:true, tension:.35, pointRadius:0, borderWidth:2},
      {label:L.st.anti, data:D.timeline.anti_rivolta, borderColor:C.anti, backgroundColor:'rgba(88,166,255,.18)', fill:true, tension:.35, pointRadius:0, borderWidth:2}]},
    options:{interaction:{mode:'index', intersect:false},
      plugins:{legend:{position:'bottom'}},
      scales:{x:{ticks:{maxTicksLimit:16, callback:(v,i)=>hlabels[i]||null, autoSkip:false}},
              y:{title:{display:true,text:L.ax_ph}}}}}));

  const MOODCOL = {rabbia:'#f85149', indignazione:'#d29922', ironia:'#a371f7', shock:'#f0883e', paura:'#8b949e', solidarieta:'#3fb950', neutro:'#58a6ff'};
  charts.push(new Chart(cMoodAll, {type:'bar', data:{
    labels:D.mood_all.map(m=>L.moods[m.key]),
    datasets:[{data:D.mood_all.map(m=>m.n), backgroundColor:D.mood_all.map(m=>MOODCOL[m.key])}]},
    options:{indexAxis:'y', plugins:{legend:{display:false}}, scales:{x:{title:{display:true,text:'post'}}}}}));

  const fp = D.mood_front.pro_rivolta, fa = D.mood_front.anti_rivolta;
  const sp = fp.reduce((a,b)=>a+b,0), sa = fa.reduce((a,b)=>a+b,0);
  charts.push(new Chart(cMoodFront, {type:'bar', data:{
    labels:D.moods.map(m=>L.moods[m]),
    datasets:[
      {label:L.st.pro, data:fp.map(v=>100*v/sp), backgroundColor:C.pro},
      {label:L.st.anti, data:fa.map(v=>100*v/sa), backgroundColor:C.anti}]},
    options:{indexAxis:'y', plugins:{legend:{position:'bottom'},
      tooltip:{callbacks:{label:c=>`${c.dataset.label}: ${c.parsed.x.toFixed(0)}%`}}},
      scales:{x:{ticks:{callback:v=>v+'%'}, title:{display:true,text:L.ax_pctf}}}}}));

  const SIDECOL = {pro:C.pro, anti:C.anti, neu:C.cron};
  charts.push(new Chart(cThemes, {type:'bar', data:{
    labels:D.themes.map(t=>L.themes[t.key]||t.label),
    datasets:[{data:D.themes.map(t=>t.n), backgroundColor:D.themes.map(t=>SIDECOL[t.side])}]},
    options:{indexAxis:'y', plugins:{legend:{display:false},
      tooltip:{callbacks:{afterLabel:c=>`${fmt(D.themes[c.dataIndex].likes)} ${L.cum_likes}`}}},
      scales:{x:{title:{display:true,text:L.ax_nocron}}}}}));

  const Ls = D.langs;
  charts.push(new Chart(cLangs, {type:'bar', data:{
    labels:Ls.map(l=>FLAG[l.key]+' '+l.key.toUpperCase()),
    datasets:[
      {label:L.st.pro, data:Ls.map(l=>100*l.pro/l.n), backgroundColor:C.pro},
      {label:L.st.cron, data:Ls.map(l=>100*l.cronaca/l.n), backgroundColor:C.cron},
      {label:L.st.anti, data:Ls.map(l=>100*l.anti/l.n), backgroundColor:C.anti},
      {label:L.st.dop, data:Ls.map(l=>100*l.doppia/l.n), backgroundColor:C.dop}]},
    options:{scales:{x:{stacked:true}, y:{stacked:true, max:100, ticks:{callback:v=>v+'%'}}},
      plugins:{legend:{position:'bottom'},
      tooltip:{callbacks:{label:c=>`${c.dataset.label}: ${c.parsed.y.toFixed(0)}%`}}}}}));

  charts.push(new Chart(cLangPro, {type:'bar', data:{
    labels:Ls.map(l=>FLAG[l.key]+' '+l.key.toUpperCase()),
    datasets:[{data:Ls.map(l=>l.pro_pct), backgroundColor:Ls.map(l=>l.key==='it'?'#f85149':C.pro)}]},
    options:{plugins:{legend:{display:false}, tooltip:{callbacks:{label:c=>`${c.parsed.y}% (${Ls[c.dataIndex].pro} pro vs ${Ls[c.dataIndex].anti} anti)`}}},
      scales:{y:{min:50, max:100, ticks:{callback:v=>v+'%'}}}}}));
}

/* dialog close */
const dlg = document.getElementById('methDialog');
document.getElementById('closeMeth').addEventListener('click', ()=>dlg.close());
dlg.addEventListener('click', e=>{ if(e.target===dlg) dlg.close(); });

renderAll('it');
</script>
