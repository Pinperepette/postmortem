<!DOCTYPE html>
<html lang="it"><head><meta charset="UTF-8">
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  html,body{width:1200px;height:630px;overflow:hidden}
  body{background:radial-gradient(circle at 16% 0%,#26202e,#0d1117 62%);color:#e6edf3;
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    padding:54px 56px;display:flex;flex-direction:column;justify-content:space-between}
  .kick{color:#58a6ff;font-size:18px;font-weight:700;letter-spacing:3px;text-transform:uppercase}
  h1{font-size:58px;line-height:1.05;letter-spacing:-1.5px;margin:10px 0 0}
  h1 .em{color:#58a6ff}
  .sub{color:#8b98a5;font-size:22px;max-width:680px;margin-top:14px}
  .row{display:flex;align-items:center;gap:30px;margin-top:18px}
  .big{font-size:120px;font-weight:800;letter-spacing:-4px;color:#58a6ff;line-height:.9}
  .bigtx{font-size:23px;color:#d3dce4;max-width:420px}
  .bigtx b{color:#fff}
  .foot{display:flex;justify-content:space-between;align-items:center;color:#8b98a5;font-size:15px;
    border-top:1px solid #2a3340;padding-top:16px}
  .foot b{color:#e6edf3}
</style></head>
<body>
  <div>
    <div class="kick">Dibattito politico · X / Twitter</div>
    <h1>Chi viene <span class="em">difeso</span>,<br>chi viene <span class="em">attaccato</span>, e perché</h1>
    <div class="row">
      <div class="big">14%</div>
      <div class="bigtx">degli utenti si <b>espone a favore</b> di un partito.<br>L'altro <b>86% non si schiera apertamente</b>.</div>
    </div>
  </div>
  <div class="foot"><span>8.334 post · 4.071 utenti · <b>3–9 giugno 2026</b></span><span>analisi del dibattito su X · non un sondaggio</span></div>
</body></html>
